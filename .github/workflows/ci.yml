name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild build \
            -project FishAndChips.xcodeproj \
            -scheme FishAndChips \
            -sdk iphonesimulator \
            -configuration Debug

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project FishAndChips.xcodeproj \
            -scheme FishAndChips \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:FishAndChipsTests \
            -skip-testing:FishAndChipsTests/CloudKitServiceTests \
            -skip-testing:FishAndChipsTests/PlayerClaimServiceTests \
            -skip-testing:FishAndChipsTests/PokerOddsCalculatorTests/testPostFlopFlushDraw \
            -skip-testing:FishAndChipsTests/PokerOddsCalculatorTests/testPostFlopWithFlush \
            -skip-testing:FishAndChipsTests/AuthViewModelTests/registration_createsUserAndAuthenticates
